name: Deploy ShiaEssentials CMS

on:
  push:
    branches:
      - main  # Adjust this to your production branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Inject Secrets into Config 🔐
        run: |
          echo "window.CONFIG = {" > config.js
          echo "  url: '${{ secrets.TURSO_URL }}'," >> config.js
          echo "  token: '${{ secrets.TURSO_TOKEN }}'" >> config.js
          echo "};" >> config.js
        # This creates config.js in the root, which index.html expects

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder the action should deploy.
          branch: gh-pages # The branch the action should deploy to.
