name: Deploy ShiaEssentials CMS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v4

      - name: Inject Secrets into Config 🔐
        run: |
          cat <<EOF > config.js
          window.CONFIG = {
            url: "${{ secrets.TURSO_URL }}",
            token: "${{ secrets.TURSO_TOKEN }}"
          };
          EOF
          echo "Verification: config.js content (redacted):"
          cat config.js | sed 's/token: ".*"/token: "***"/'

      - name: List files for debugging 🔍
        run: ls -la

      - name: Upload artifact 📤
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
