name: Deploy ShiaEssentials CMS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v4

      - name: Inject Secrets into Config 🔐
        run: |
          echo "window.CONFIG = {" > config.js
          echo "  url: '${{ secrets.TURSO_URL }}'," >> config.js
          echo "  token: '${{ secrets.TURSO_TOKEN }}'" >> config.js
          echo "};" >> config.js

      - name: Upload artifact 📤
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
